<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Aivory AI Readiness Platform</title>
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="dashboard-layout.css?v=3">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Enterprise-Grade Dashboard Layout -->
    <div class="dashboard-layout">
        <!-- Top Bar -->
        <div class="dashboard-topbar">
            <div class="topbar-left">
                <img src="aivory_logo.png" alt="Aivory" class="topbar-logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            </div>
            <div class="topbar-right">
                <div class="topbar-stat">
                    <span class="topbar-stat-label">Tier:</span>
                    <span class="topbar-stat-value" id="tierBadgeTop">Free</span>
                </div>
                <div class="topbar-stat">
                    <span class="topbar-stat-label">Credits:</span>
                    <span class="topbar-stat-value success" id="creditsDisplay">0</span>
                </div>
                <div class="language-toggle">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="id">ID</button>
                </div>
            </div>
        </div>

        <!-- Sidebar Navigation -->
        <div class="dashboard-sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-nav-item active" onclick="showDashboardSection('overview'); return false;">
                    <span class="sidebar-nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="7" height="7" rx="1"/>
                            <rect x="14" y="3" width="7" height="7" rx="1"/>
                            <rect x="14" y="14" width="7" height="7" rx="1"/>
                            <rect x="3" y="14" width="7" height="7" rx="1"/>
                        </svg>
                    </span>
                    <span>Overview</span>
                </a>
                <a href="#" class="sidebar-nav-item" onclick="showDashboardSection('workflows'); return false;">
                    <span class="sidebar-nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                    </span>
                    <span>Workflows</span>
                </a>
                <a href="#" class="sidebar-nav-item" onclick="showDashboardSection('console'); return false;">
                    <span class="sidebar-nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </span>
                    <span>Console</span>
                </a>
                <a href="#" class="sidebar-nav-item" onclick="showDashboardSection('logs'); return false;">
                    <span class="sidebar-nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </span>
                    <span>Logs</span>
                </a>
                <a href="#" class="sidebar-nav-item" onclick="showDashboardSection('diagnostics'); return false;">
                    <span class="sidebar-nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </span>
                    <span>Diagnostics</span>
                </a>
            </nav>
            
            <div class="sidebar-section-title">SETTINGS</div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-nav-item" onclick="showDashboardSection('settings'); return false;">
                    <span class="sidebar-nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v6m9-9h-6m-6 0H3m15.364 6.364l-4.243-4.243m-6.364 0L3.636 18.364m12.728 0l-4.243-4.243m-6.364 0L3.636 5.636"/>
                        </svg>
                    </span>
                    <span>Settings</span>
                </a>
                <a href="index.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </span>
                    <span>Home</span>
                </a>
            </nav>
        </div>

        <!-- Main Canvas -->
        <div class="dashboard-main">
            <!-- Loading State -->
            <div id="loadingState" class="loading-state" style="display: none;">
                <div class="spinner"></div>
                <p class="loading-text">Analyzing your AI readiness...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error-state" style="display: none;">
                <div class="error-card">
                    <h2>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display: inline-block; vertical-align: middle; margin-right: 0.5rem;">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                            <line x1="12" y1="9" x2="12" y2="13"/>
                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                        Temporarily Unavailable
                    </h2>
                    <p>AI analysis is temporarily unavailable. Please try again in a moment.</p>
                    <button class="cta-button primary" onclick="window.location.reload()">Try Again</button>
                </div>
            </div>

            <!-- Free Mode Dashboard -->
            <div id="freeDashboard" class="dashboard-mode" style="display: none;">
                <!-- Content will be dynamically rendered -->
            </div>

            <!-- Snapshot Mode Dashboard -->
            <div id="snapshotDashboard" class="dashboard-mode" style="display: none;">
                <!-- Content will be dynamically rendered -->
            </div>

            <!-- Blueprint Mode Dashboard -->
            <div id="blueprintDashboard" class="dashboard-mode" style="display: none;">
                <!-- Content will be dynamically rendered -->
            </div>

            <!-- Operate Mode Dashboard -->
            <div id="operateDashboard" class="dashboard-mode" style="display: none;">
                <!-- Content will be dynamically rendered -->
            </div>
        </div>
    </div>

    <!-- Dashboard JavaScript -->
    <script src="auth-guard.js"></script>
    <script src="dashboard.js"></script>
    <script>
        // Guard dashboard access on load
        document.addEventListener('DOMContentLoaded', async () => {
            const authorized = await guardDashboardAccess();
            if (authorized) {
                initDashboard();
            }
        });
    </script>
</body>
</html>
