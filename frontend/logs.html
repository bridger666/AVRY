<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="app-shell.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="auth-modals.css">
    <style>
        .log-row {
            cursor: pointer;
            transition: background 0.2s;
        }
        .log-row:hover {
            background: rgba(255,255,255,0.05);
        }
        .log-detail {
            display: none;
            padding: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .log-detail.expanded {
            display: block;
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-family: 'Inter Tight', sans-serif;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Unified Sidebar -->
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <img src="Aivory_console_pic.svg" alt="Aivory">
                    <span>Aivory</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Main</div>
                    <a href="http://localhost:3001/console" class="sidebar-nav-item" target="_blank">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span>Console</span>
                    </a>
                    <a href="http://localhost:3000/dashboard" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="workflows.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        </svg>
                        <span>Workflows</span>
                    </a>
                    <a href="logs.html" class="sidebar-nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <span>Logs</span>
                    </a>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Insights</div>
                    <a href="index.html#free-diagnostic" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                        <span>Diagnostics</span>
                    </a>
                    <a href="http://localhost:3000/dashboard?tab=snapshot" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>

                        </svg>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">Configuration</div>
                    <a href="settings.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v6m5.2-13.2l-4.2 4.2m0 6l4.2 4.2M23 12h-6m-6 0H1m18.2-5.2l-4.2 4.2m0 6l4.2 4.2"/>
                        </svg>

                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                    <span>Home</span>
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="app-main">
            <div class="app-topbar">
                <div class="topbar-left">
                    <h1 class="topbar-title">Execution Logs</h1>
                </div>
                <div class="topbar-right">
                    <div class="topbar-item">
                        <span class="topbar-badge" id="tierBadgeTop">Free</span>
                    </div>
                    <div class="topbar-item">
                        <span id="creditsDisplay">0 credits</span>
                    </div>
                </div>
            </div>
            
            <div class="app-content">
                <!-- Logs Table -->
                <div class="dashboard-card">
                    <!-- Filter Bar -->
                    <div class="filter-bar">
                        <select id="workflow-filter" onchange="applyFilters()">
                            <option value="">All Workflows</option>
                        </select>
                        <select id="status-filter" onchange="applyFilters()">
                            <option value="">All Statuses</option>
                            <option value="success">Success</option>
                            <option value="failed">Failed</option>
                            <option value="running">Running</option>
                        </select>
                        <input type="date" id="date-from" onchange="applyFilters()" placeholder="From Date">
                        <input type="date" id="date-to" onchange="applyFilters()" placeholder="To Date">
                    </div>

                    <div id="logs-container">
                        <div style="text-align: center; padding: 3rem; color: rgba(255,255,255,0.6);">
                            Loading logs...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js?v=27"></script>
    <script src="user-state-manager.js?v=27"></script>
    <script src="workflow-alert.js?v=27"></script>
    <script src="auth-manager.js?v=27"></script>
    <script src="auth-modals.js?v=27"></script>
    <script src="sidebar-toggle.js?v=27"></script>
    <script src="auth-guard.js?v=27"></script>
    <script src="tier-sync.js?v=27"></script>
    <script>
        let allLogs = [];
        
        // Initialize logs page
        async function initLogs() {
            const userId = AuthManager.getUserId() || 'GrandMasterRCH';
            
            try {
                const response = await fetch(`${window.API_BASE_URL}/api/v1/logs?user_id=${userId}`);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch logs');
                }
                
                allLogs = await response.json();
                populateWorkflowFilter();
                renderLogs(allLogs);
                
            } catch (error) {
                console.error('Error loading logs:', error);
                renderEmptyState();
            }
        }
        
        function populateWorkflowFilter() {
            const workflowFilter = document.getElementById('workflow-filter');
            const workflows = [...new Set(allLogs.map(log => log.workflow_name))];
            
            workflows.forEach(workflow => {
                const option = document.createElement('option');
                option.value = workflow;
                option.textContent = workflow;
                workflowFilter.appendChild(option);
            });
        }
        
        function applyFilters() {
            const workflowFilter = document.getElementById('workflow-filter').value;
            const statusFilter = document.getElementById('status-filter').value;
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;
            
            let filtered = allLogs;
            
            if (workflowFilter) {
                filtered = filtered.filter(log => log.workflow_name === workflowFilter);
            }
            
            if (statusFilter) {
                filtered = filtered.filter(log => log.status === statusFilter);
            }
            
            if (dateFrom) {
                filtered = filtered.filter(log => new Date(log.timestamp) >= new Date(dateFrom));
            }
            
            if (dateTo) {
                filtered = filtered.filter(log => new Date(log.timestamp) <= new Date(dateTo));
            }
            
            renderLogs(filtered);
        }
        
        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            
            if (logs.length === 0) {
                renderEmptyState();
                return;
            }
            
            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(255,255,255,0.1);">
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Workflow</th>
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Timestamp</th>
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Status</th>
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Duration</th>
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Trigger</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${logs.map((log, idx) => `
                            <tr class="log-row" onclick="toggleLogDetail(${idx})" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <td style="padding: 1rem; font-weight: 600; color: rgba(255,255,255,0.9);">${log.workflow_name}</td>
                                <td style="padding: 1rem; color: rgba(255,255,255,0.7); font-size: 0.875rem;">${new Date(log.timestamp).toLocaleString()}</td>
                                <td style="padding: 1rem;">
                                    <span style="padding: 0.25rem 0.75rem; background: ${getStatusColor(log.status)}; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">${log.status}</span>
                                </td>
                                <td style="padding: 1rem; color: rgba(255,255,255,0.7); font-size: 0.875rem;">${log.duration || 'N/A'}</td>
                                <td style="padding: 1rem; color: rgba(255,255,255,0.7); font-size: 0.875rem;">${log.trigger_type || 'Manual'}</td>
                            </tr>
                            <tr>
                                <td colspan="5" style="padding: 0;">
                                    <div id="log-detail-${idx}" class="log-detail">
                                        <h4 style="margin-bottom: 1rem; color: rgba(255,255,255,0.9);">Execution Details</h4>
                                        <pre style="background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 0.875rem; color: rgba(255,255,255,0.8);">${JSON.stringify(log, null, 2)}</pre>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function toggleLogDetail(idx) {
            const detail = document.getElementById(`log-detail-${idx}`);
            detail.classList.toggle('expanded');
        }
        
        function renderEmptyState() {
            const container = document.getElementById('logs-container');
            container.innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <h2 style="color: rgba(255,255,255,0.9); margin-bottom: 1rem;">No execution logs yet</h2>
                    <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Logs will appear here once workflows start executing.</p>
                    <a href="workflows.html" style="display: inline-block; padding: 1rem 2rem; background: #07d197; color: #1a0b2e; text-decoration: none; border-radius: 8px; font-weight: 600;">View Workflows</a>
                </div>
            `;
        }
        
        function getStatusColor(status) {
            switch(status) {
                case 'success': return 'rgba(7,209,151,0.2)';
                case 'failed': return 'rgba(255,107,107,0.2)';
                case 'running': return 'rgba(139,92,246,0.2)';
                default: return 'rgba(255,255,255,0.1)';
            }
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', async () => {
            const authorized = await guardDashboardAccess();
            if (authorized) {
                initLogs();
                addLogoutButton();
            }
        });
    </script>
</body>
</html>
