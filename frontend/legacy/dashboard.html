<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview - Aivory</title>
    
    <!-- Unified App Shell Styles -->
    <link rel="stylesheet" href="app-shell.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="auth-modals.css">
</head>
<body>
    <div class="app-shell">
        <!-- Unified Sidebar -->
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <img src="Aivory_console_pic.svg" alt="Aivory">
                    <span>Aivory</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Main</div>
                    <a href="http://localhost:3001/console" class="sidebar-nav-item" target="_blank">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span>Console</span>
                    </a>
                    <a href="dashboard.html" class="sidebar-nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="workflows.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        </svg>
                        <span>Workflows</span>
                    </a>
                    <a href="logs.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <span>Logs</span>
                    </a>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Insights</div>
                    <a href="#" class="sidebar-nav-item" onclick="event.preventDefault(); switchTab('diagnostic')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                        <span>Diagnostics</span>
                    </a>
                    <a href="#" class="sidebar-nav-item" onclick="event.preventDefault(); switchTab('snapshot')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <span>Snapshots</span>
                    </a>
                    <a href="#" class="sidebar-nav-item" onclick="event.preventDefault(); switchTab('blueprint')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                        </svg>
                        <span>Blueprints</span>
                    </a>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Configuration</div>
                    <a href="settings.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v6m5.2-13.2l-4.2 4.2m0 6l4.2 4.2M23 12h-6m-6 0H1m18.2-5.2l-4.2 4.2m0 6l4.2 4.2"/>
                        </svg>
                        <span>Settings</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                    <span>Home</span>
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="app-main">
            <div class="app-topbar">
                <div class="topbar-left">
                    <h1 class="topbar-title">Overview</h1>
                </div>
                <div class="topbar-right">
                    <div class="topbar-item">
                        <span class="topbar-badge" id="tierBadgeTop">Free</span>
                    </div>
                    <div class="topbar-item">
                        <span id="creditsDisplay">0 credits</span>
                    </div>
                    <div class="language-toggle">
                        <button class="lang-btn active" data-lang="en">EN</button>
                        <button class="lang-btn" data-lang="id">ID</button>
                    </div>
                </div>
            </div>
            
            <div class="app-content">
                <!-- Tab Navigation -->
                <div class="dashboard-tabs">
                    <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
                    <button class="tab-btn" data-tab="diagnostic" onclick="switchTab('diagnostic')">Diagnostic Results</button>
                    <button class="tab-btn" data-tab="snapshot" onclick="switchTab('snapshot')">Snapshot Results</button>
                    <button class="tab-btn" data-tab="blueprint" onclick="switchTab('blueprint')">AI Blueprint</button>
                </div>
                <!-- Loading State -->
                <div id="loadingState" class="loading-state" style="display: none;">
                    <div class="spinner"></div>
                    <p class="loading-text">Analyzing your AI readiness...</p>
                </div>

                <!-- Error State -->
                <div id="errorState" class="error-state" style="display: none;">
                    <div class="error-card">
                        <h2>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display: inline-block; vertical-align: middle; margin-right: 0.5rem;">
                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                <line x1="12" y1="9" x2="12" y2="13"/>
                                <line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                            Temporarily Unavailable
                        </h2>
                        <p>AI analysis is temporarily unavailable. Please try again in a moment.</p>
                        <button class="cta-button primary" onclick="window.location.reload()">Try Again</button>
                    </div>
                </div>

                <!-- Tab: Overview -->
                <div id="tab-overview" class="tab-panel active">
                    <!-- Content will be dynamically rendered -->
                </div>

                <!-- Tab: Diagnostic Results -->
                <div id="tab-diagnostic" class="tab-panel">
                    <!-- Content will be dynamically rendered -->
                </div>

                <!-- Tab: Snapshot Results -->
                <div id="tab-snapshot" class="tab-panel">
                    <!-- Content will be dynamically rendered -->
                </div>

                <!-- Tab: AI Blueprint -->
                <div id="tab-blueprint" class="tab-panel">
                    <!-- Content will be dynamically rendered -->
                </div>
            </div>
        </main>
    </div>

    <!-- Dashboard JavaScript -->
    <script src="app.js?v=28"></script>
    <script src="user-state-manager.js?v=28"></script>
    <script src="workflow-alert.js?v=28"></script>
    <script src="id-chain-manager.js?v=28"></script>
    <script src="auth-manager.js?v=28"></script>
    <script src="auth-modals.js?v=28"></script>
    <script src="sidebar-toggle.js?v=28"></script>
    <script src="auth-guard.js?v=28"></script>
    <script src="tier-sync.js?v=28"></script>
    <script src="dashboard.js?v=28"></script>
    <script>
        // Guard dashboard access on load
        document.addEventListener('DOMContentLoaded', async () => {
            const authorized = await guardDashboardAccess();
            if (authorized) {
                initDashboard();
                addLogoutButton();
            }
        });
    </script>
</body>
</html>
