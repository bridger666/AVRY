<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin Quick Login</title>
    <style>
        body {
            font-family: 'Inter Tight', sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #16213e 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 3rem;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin: 0 0 2rem 0;
            color: #07d197;
        }
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .status.loading {
            background: rgba(139,92,246,0.2);
            color: #8b5cf6;
        }
        .status.success {
            background: rgba(7,209,151,0.2);
            color: #07d197;
        }
        .status.error {
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #07d197;
            color: #1a0b2e;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #06c085;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 Superadmin Quick Login</h1>
        
        <div id="status" class="status loading">
            Logging in as superadmin...
        </div>
        
        <div class="info">
            <strong>Email:</strong> grandmaster@aivory.ai<br>
            <strong>Password:</strong> GrandMaster2026!<br>
            <strong>User ID:</strong> GrandMasterRCH
        </div>
        
        <button id="retry-btn" style="display: none;" onclick="login()">Retry Login</button>
        <button id="dashboard-btn" style="display: none;" onclick="goToDashboard()">Go to Dashboard</button>
    </div>

    <script src="app.js"></script>
    <script src="auth-manager.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const retryBtn = document.getElementById('retry-btn');
        const dashboardBtn = document.getElementById('dashboard-btn');
        
        async function login() {
            statusEl.className = 'status loading';
            statusEl.textContent = 'Logging in as superadmin...';
            retryBtn.style.display = 'none';
            dashboardBtn.style.display = 'none';
            
            try {
                const response = await fetch(`${window.API_BASE_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'grandmaster@aivory.ai',
                        password: 'GrandMaster2026!'
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Login failed');
                }
                
                const data = await response.json();
                
                // Store tokens using AuthManager
                if (typeof AuthManager !== 'undefined') {
                    AuthManager.setTokens(data.tokens.access_token, data.tokens.refresh_token);
                    AuthManager.setUser(data.user);
                } else {
                    // Fallback: store directly in localStorage
                    localStorage.setItem('aivory_session_token', data.tokens.access_token);
                    localStorage.setItem('aivory_refresh_token', data.tokens.refresh_token);
                    localStorage.setItem('aivory_user', JSON.stringify(data.user));
                }
                
                statusEl.className = 'status success';
                statusEl.innerHTML = `
                    ✅ Login successful!<br>
                    <small>Tier: ${data.user.tier} | Credits: ${data.user.credits}/${data.user.credits_max}</small>
                `;
                dashboardBtn.style.display = 'block';
                
                // Auto-redirect after 2 seconds
                setTimeout(goToDashboard, 2000);
                
            } catch (error) {
                console.error('Login error:', error);
                statusEl.className = 'status error';
                statusEl.textContent = `❌ Login failed: ${error.message}`;
                retryBtn.style.display = 'block';
            }
        }
        
        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }
        
        // Auto-login on page load
        setTimeout(login, 500);
    </script>
</body>
</html>
