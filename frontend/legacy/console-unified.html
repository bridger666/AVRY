<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Console - Aivory</title>
    
    <!-- Unified Shell + Console CSS -->
    <link rel="stylesheet" href="app-shell.css">
    <link rel="stylesheet" href="console-unified.css">
    
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <!-- Unified Sidebar -->
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <img src="Aivory_console_pic.svg" alt="Aivory">
                    <span>Aivory</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Main</div>
                    <a href="console-unified.html" class="sidebar-nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span>Console</span>
                    </a>
                    <a href="dashboard.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="workflows.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        </svg>
                        <span>Workflows</span>
                    </a>
                    <a href="logs.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <span>Logs</span>
                    </a>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Configuration</div>
                    <a href="settings.html" class="sidebar-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v6m5.2-13.2l-4.2 4.2m0 6l4.2 4.2M23 12h-6m-6 0H1m18.2-5.2l-4.2 4.2m0 6l4.2 4.2"/>
                        </svg>
                        <span>Settings</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                    <span>Home</span>
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="app-main">
            <div class="app-topbar">
                <div class="topbar-left">
                    <h1 class="topbar-title">AI Console</h1>
                </div>
                <div class="topbar-right">
                    <button class="topbar-btn" onclick="clearConversation()">Clear</button>
                </div>
            </div>
            
            <div class="app-content console-content">
                <!-- Message List -->
                <div class="message-list" id="messageList">
                    <div class="message-list-inner" id="messageListInner">
                        <!-- Empty state (shown when no messages) -->
                        <div class="empty-state" id="emptyState">
                            <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                            <h2 class="empty-state-title">Start a conversation</h2>
                            <p class="empty-state-text">Ask ARIA anything about your workflows, automation, or AI systems.</p>
                        </div>
                        
                        <!-- Messages will be inserted here -->
                    </div>
                </div>
                
                <!-- Input Bar (Fixed at bottom) -->
                <div class="input-bar">
                    <div class="input-bar-inner">
                        <div class="input-wrapper">
                            <textarea 
                                id="chatInput" 
                                class="input-textarea" 
                                placeholder="Ask anything..."
                                rows="1"
                            ></textarea>
                            <button class="send-btn" id="sendBtn" aria-label="Send message">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                </svg>
                            </button>
                        </div>
                        <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Load ARIA Agent FIRST -->
    <script src="console-aria.js"></script>
    
    <!-- Console JavaScript -->
    <script>
        let ariaAgent;
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Get user config from localStorage
                const tier = localStorage.getItem('aivory_tier') || 'enterprise';
                const userId = localStorage.getItem('aivory_user_id') || 'demo_user';
                const credits = parseInt(localStorage.getItem('aivory_credits') || '2000');
                
                // Initialize ARIA agent
                ariaAgent = new ARIAAgent({
                    tier: tier,
                    userId: userId,
                    has_snapshot: false,
                    has_blueprint: false,
                    credits: credits
                });
                
                await ariaAgent.initialize();
                
                // Setup event listeners
                setupEventListeners();
                
                // Restore conversation
                restoreConversation();
                
            } catch (error) {
                console.error('Initialization error:', error);
                alert('Failed to initialize console: ' + error.message);
            }
        });
        
        function setupEventListeners() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            
            // Send button click
            sendBtn.addEventListener('click', handleSend);
            
            // Enter to send
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
            
            // Auto-resize textarea
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 200) + 'px';
            });
        }
        
        async function handleSend() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message || !ariaAgent) return;
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Hide empty state
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();
            
            // Add user message
            addMessage('user', message);
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                const response = await ariaAgent.sendMessage(message);
                hideTypingIndicator();
                addMessage('assistant', response.response, true);
                ariaAgent.saveConversation();
            } catch (error) {
                console.error('Error sending message:', error);
                hideTypingIndicator();
                addMessage('assistant', `Error: ${error.message}`);
            }
        }
        
        function addMessage(role, content, shouldStream = false) {
            const container = document.getElementById('messageListInner');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${role}`;
            
            const avatarHTML = role === 'user'
                ? `<div class="message-avatar">
                     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                       <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                       <circle cx="12" cy="7" r="4"/>
                     </svg>
                   </div>`
                : `<div class="message-avatar">
                     <img src="Aivory_console_pic.svg" alt="ARIA" onerror="this.style.display='none'">
                   </div>`;
            
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                ${avatarHTML}
                <div class="message-content">
                    <div class="message-text"></div>
                    <div class="message-timestamp">${timestamp}</div>
                </div>
            `;
            
            container.appendChild(messageDiv);
            
            const textContainer = messageDiv.querySelector('.message-text');
            
            if (role === 'assistant' && shouldStream) {
                ariaAgent.streamText(textContainer, content, () => {
                    if (typeof hljs !== 'undefined') {
                        textContainer.querySelectorAll('pre code').forEach(block => {
                            hljs.highlightElement(block);
                        });
                    }
                });
            } else {
                textContainer.innerHTML = role === 'assistant' 
                    ? ariaAgent.renderMarkdown(content)
                    : escapeHtml(content);
            }
            
            scrollToBottom();
        }
        
        function showTypingIndicator() {
            const container = document.getElementById('messageListInner');
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'message message-ai typing-indicator';
            indicator.innerHTML = `
                <div class="message-avatar">
                    <img src="Aivory_console_pic.svg" alt="ARIA" onerror="this.style.display='none'">
                </div>
                <div class="message-content">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(indicator);
            scrollToBottom();
        }
        
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function restoreConversation() {
            if (!ariaAgent || ariaAgent.conversationHistory.length === 0) return;
            
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();
            
            ariaAgent.conversationHistory.forEach(msg => {
                addMessage(msg.role, msg.content, false);
            });
        }
        
        function clearConversation() {
            if (ariaAgent) ariaAgent.clearConversation();
            
            const container = document.getElementById('messageListInner');
            container.innerHTML = `
                <div class="empty-state" id="emptyState">
                    <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <h2 class="empty-state-title">Start a conversation</h2>
                    <p class="empty-state-text">Ask ARIA anything about your workflows, automation, or AI systems.</p>
                </div>
            `;
        }
        
        function scrollToBottom() {
            const container = document.getElementById('messageList');
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
