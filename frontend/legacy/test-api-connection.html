<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test - Aivory</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px 10px 0;
        }
        button:hover {
            background: #2980b9;
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }
        pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="test-card">
        <h1>🔧 API Connection Test</h1>
        <p>This page tests the connection between frontend (port 9000) and backend API (port 8081)</p>
        
        <div id="config-info" class="status info">
            <strong>Configuration:</strong><br>
            Frontend URL: <span id="frontend-url">Loading...</span><br>
            API Base URL: <span id="api-url">Loading...</span>
        </div>
        
        <div>
            <button onclick="testHealthEndpoint()">Test /health Endpoint</button>
            <button onclick="testAuthMe()">Test /api/v1/auth/me</button>
            <button onclick="testLogin()">Test Login (GrandMaster)</button>
        </div>
        
        <div id="test-results"></div>
    </div>
    
    <script src="app.js"></script>
    <script src="auth-manager.js"></script>
    <script>
        // Display configuration
        document.getElementById('frontend-url').textContent = window.location.origin;
        document.getElementById('api-url').textContent = window.API_BASE_URL;
        
        function showResult(title, success, message, data = null) {
            const resultsDiv = document.getElementById('test-results');
            const statusClass = success ? 'success' : 'error';
            
            let html = `
                <div class="test-result">
                    <div class="status ${statusClass}">
                        <strong>${title}</strong><br>
                        ${message}
                    </div>
            `;
            
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            html += '</div>';
            resultsDiv.innerHTML = html;
        }
        
        async function testHealthEndpoint() {
            try {
                console.log('Testing health endpoint:', `${window.API_BASE_URL}/health`);
                const response = await fetch(`${window.API_BASE_URL}/health`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                showResult(
                    '✅ Health Check Success',
                    true,
                    `Backend is running and responding on ${window.API_BASE_URL}`,
                    data
                );
            } catch (error) {
                showResult(
                    '❌ Health Check Failed',
                    false,
                    `Error: ${error.message}<br><br>Make sure the backend is running on port 8081:<br><code>python3 -m uvicorn app.main:app --reload --port 8081</code>`
                );
            }
        }
        
        async function testAuthMe() {
            try {
                const token = AuthManager.getAccessToken();
                if (!token) {
                    showResult(
                        '⚠️ Not Authenticated',
                        false,
                        'No access token found. Please login first using the "Test Login" button.'
                    );
                    return;
                }
                
                console.log('Testing /api/v1/auth/me with token:', token.substring(0, 20) + '...');
                const response = await fetch(`${window.API_BASE_URL}/api/v1/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`HTTP ${response.status}: ${errorData.detail || response.statusText}`);
                }
                
                const data = await response.json();
                showResult(
                    '✅ Auth Me Success',
                    true,
                    'Successfully retrieved user data with enriched fields',
                    data
                );
            } catch (error) {
                showResult(
                    '❌ Auth Me Failed',
                    false,
                    `Error: ${error.message}`
                );
            }
        }
        
        async function testLogin() {
            try {
                console.log('Testing login with GrandMaster credentials...');
                const user = await AuthManager.login('grandmaster@aivory.ai', 'GrandMaster2026!');
                
                showResult(
                    '✅ Login Success',
                    true,
                    `Successfully logged in as ${user.email}`,
                    user
                );
                
                // Auto-test /auth/me after successful login
                setTimeout(() => testAuthMe(), 1000);
                
            } catch (error) {
                showResult(
                    '❌ Login Failed',
                    false,
                    `Error: ${error.message}<br><br>Common issues:<br>
                    1. Backend not running on port 8081<br>
                    2. Database not initialized<br>
                    3. Incorrect credentials<br>
                    4. CORS configuration issue`
                );
            }
        }
        
        // Auto-run health check on load
        window.addEventListener('load', () => {
            setTimeout(testHealthEndpoint, 500);
        });
    </script>
</body>
</html>
