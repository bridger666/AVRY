<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Login Test - No Cache</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 14px;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin: 10px 0;
        }
        button:hover { background: #2980b9; }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Direct Login Test</h1>
        <p>This page tests login WITHOUT loading app.js (no cache issues)</p>
        
        <div class="info">
            <strong>Configuration:</strong><br>
            Frontend: http://localhost:9000<br>
            API: http://localhost:8081<br>
            Endpoint: /api/v1/auth/login
        </div>
        
        <button onclick="testLogin()">Test Login (GrandMaster)</button>
        
        <div id="result"></div>
    </div>
    
    <script>
        // Direct configuration - no dependencies
        const API_URL = 'http://localhost:8081';
        
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="info">Testing login...</div>';
            
            try {
                console.log('Calling:', `${API_URL}/api/v1/auth/login`);
                
                const response = await fetch(`${API_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'grandmaster@aivory.ai',
                        password: 'GrandMaster2026!'
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const contentType = response.headers.get('content-type');
                console.log('Content-Type:', contentType);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                console.log('Success! Data:', data);
                
                resultDiv.innerHTML = `
                    <div class="result success">
                        <strong>✅ LOGIN SUCCESS!</strong><br><br>
                        User ID: ${data.user.user_id}<br>
                        Email: ${data.user.email}<br>
                        Account Type: ${data.user.account_type}<br>
                        Tier: ${data.user.tier}<br>
                        Credits: ${data.user.credits} / ${data.user.credits_max}<br>
                        Has Diagnostic: ${data.user.has_diagnostic}<br>
                        Has Snapshot: ${data.user.has_snapshot}<br>
                        Has Blueprint: ${data.user.has_blueprint}<br>
                        Is Subscribed: ${data.user.is_subscribed}<br><br>
                        <strong>Access Token:</strong><br>
                        ${data.tokens.access_token.substring(0, 50)}...<br><br>
                        <strong>Full Response:</strong><br>
                        ${JSON.stringify(data, null, 2)}
                    </div>
                `;
                
            } catch (error) {
                console.error('Login failed:', error);
                
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>❌ LOGIN FAILED</strong><br><br>
                        Error: ${error.message}<br><br>
                        <strong>Troubleshooting:</strong><br>
                        1. Check FastAPI is running: curl http://localhost:8081/health<br>
                        2. Check CORS is enabled in FastAPI<br>
                        3. Check browser console for details<br>
                        4. Try: python3 -m uvicorn app.main:app --reload --port 8081
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
