    <!-- Scripts -->
    <script src="app.js?v=27"></script>
    <script src="user-state-manager.js?v=27"></script>
    <script src="workflow-alert.js?v=27"></script>
    <script src="auth-manager.js?v=27"></script>
    <script src="auth-modals.js?v=27"></script>
    <script src="sidebar-toggle.js?v=27"></script>
    <script src="auth-guard.js?v=27"></script>
    <script src="tier-sync.js?v=27"></script>
    <script>
        // Initialize workflows page
        async function initWorkflows() {
            const userId = AuthManager.getUserId() || 'GrandMasterRCH';
            
            try {
                const response = await fetch(`${window.API_BASE_URL}/api/v1/workflows?user_id=${userId}`);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch workflows');
                }
                
                const workflows = await response.json();
                renderWorkflows(workflows);
                
            } catch (error) {
                console.error('Error loading workflows:', error);
                renderEmptyState();
            }
        }
        
        function renderWorkflows(workflows) {
            const container = document.getElementById('workflows-container');
            
            if (workflows.length === 0) {
                renderEmptyState();
                return;
            }
            
            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(255,255,255,0.1);">
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Name</th>
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Status</th>
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Last Run</th>
                            <th style="padding: 1rem; text-align: left; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Executions</th>
                            <th style="padding: 1rem; text-align: center; color: rgba(255,255,255,0.6); font-size: 0.875rem; font-weight: 600;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${workflows.map(workflow => `
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); ${workflow.status === 'failed' ? 'background: rgba(255,107,107,0.1);' : ''}">
                                <td style="padding: 1rem;">
                                    <div style="font-weight: 600; color: rgba(255,255,255,0.9);">${workflow.name}</div>
                                    ${workflow.status === 'failed' && workflow.error_message ? `<div style="font-size: 0.75rem; color: #ff6b6b; margin-top: 0.25rem;">${workflow.error_message}</div>` : ''}
                                </td>
                                <td style="padding: 1rem;">
                                    <span style="padding: 0.25rem 0.75rem; background: ${getStatusColor(workflow.status)}; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">${workflow.status}</span>
                                </td>
                                <td style="padding: 1rem; color: rgba(255,255,255,0.7); font-size: 0.875rem;">${workflow.last_run || 'Never'}</td>
                                <td style="padding: 1rem; color: rgba(255,255,255,0.7); font-size: 0.875rem;">${workflow.execution_count || 0}</td>
                                <td style="padding: 1rem; text-align: center;">
                                    <button onclick="toggleWorkflow('${workflow.id}')" style="padding: 0.5rem 1rem; background: ${workflow.status === 'active' ? 'rgba(255,170,0,0.2)' : 'rgba(7,209,151,0.2)'}; border: 1px solid ${workflow.status === 'active' ? '#ffaa00' : '#07d197'}; border-radius: 4px; color: ${workflow.status === 'active' ? '#ffaa00' : '#07d197'}; cursor: pointer; font-size: 0.875rem; font-weight: 600;">
                                        ${workflow.status === 'active' ? 'Pause' : 'Activate'}
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function renderEmptyState() {
            const container = document.getElementById('workflows-container');
            container.innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <h2 style="color: rgba(255,255,255,0.9); margin-bottom: 1rem;">No workflows deployed yet</h2>
                    <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Upload your Blueprint to get started.</p>
                    <a href="http://localhost:3000/dashboard" style="display: inline-block; padding: 1rem 2rem; background: #07d197; color: #1a0b2e; text-decoration: none; border-radius: 8px; font-weight: 600;">Go to Dashboard</a>
                </div>
            `;
        }
        
        function getStatusColor(status) {
            switch(status) {
                case 'active': return 'rgba(7,209,151,0.2)';
                case 'paused': return 'rgba(255,170,0,0.2)';
                case 'failed': return 'rgba(255,107,107,0.2)';
                default: return 'rgba(255,255,255,0.1)';
            }
        }
        
        async function toggleWorkflow(workflowId) {
            try {
                const response = await fetch(`${window.API_BASE_URL}/api/v1/workflows/${workflowId}/toggle`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${AuthManager.getAccessToken()}`
                    }
                });
                
                if (response.ok) {
                    // Reload workflows
                    initWorkflows();
                } else {
                    alert('Failed to toggle workflow');
                }
            } catch (error) {
                console.error('Error toggling workflow:', error);
                alert('Failed to toggle workflow');
            }
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', async () => {
            const authorized = await guardDashboardAccess();
            if (authorized) {
                initWorkflows();
                addLogoutButton();
            }
        });
    </script>
