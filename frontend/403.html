<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Aivory</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-subscription.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-3);
        }
        
        .unauthorized-container {
            max-width: 600px;
            text-align: center;
        }
        
        .unauthorized-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: var(--radius-card);
            border: 1px solid var(--card-border);
        }
        
        .error-icon {
            font-size: 4rem;
            margin-bottom: var(--space-3);
        }
        
        .error-title {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: var(--space-2);
            color: var(--text-primary);
        }
        
        .error-message {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-4);
            line-height: 1.6;
        }
        
        .tier-required {
            background: rgba(255, 255, 255, 0.06);
            padding: var(--space-2);
            border-radius: 8px;
            margin-bottom: var(--space-4);
        }
        
        .tier-badge-large {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: var(--radius-button);
            font-size: 1rem;
            font-weight: 400;
            background: var(--button-purple);
            color: white;
            margin-top: var(--space-1);
        }
        
        .action-buttons {
            display: flex;
            gap: var(--space-2);
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: var(--button-purple);
            border: none;
            border-radius: var(--radius-button);
            padding: 0.75rem 2rem;
            color: white;
            font-family: 'Inter Tight', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-standard);
        }
        
        .btn-primary:hover {
            background: var(--mint-green);
            color: #1a0b2e;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-button);
            padding: 0.75rem 2rem;
            color: var(--text-primary);
            font-family: 'Inter Tight', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-standard);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--card-border-hover);
        }
    </style>
</head>
<body>
    <div class="unauthorized-container">
        <div class="unauthorized-card">
            <div class="error-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1 class="error-title">Access Denied</h1>
            <p class="error-message" id="errorMessage">
                You don't have permission to access this resource. Please upgrade your subscription to continue.
            </p>
            
            <div class="tier-required" id="tierRequired" style="display: none;">
                <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Required Tier:</p>
                <span class="tier-badge-large" id="requiredTierBadge">--</span>
            </div>
            
            <div class="action-buttons">
                <button class="btn-primary" onclick="viewPlans()">View Subscription Plans</button>
                <button class="btn-secondary" onclick="goHome()">Return to Homepage</button>
            </div>
        </div>
    </div>

    <script>
        // Load unauthorized context from sessionStorage
        const requiredTier = sessionStorage.getItem('unauthorized_tier');
        const message = sessionStorage.getItem('unauthorized_message');
        
        if (requiredTier) {
            document.getElementById('requiredTierBadge').textContent = requiredTier.charAt(0).toUpperCase() + requiredTier.slice(1);
            document.getElementById('tierRequired').style.display = 'block';
        }
        
        if (message) {
            document.getElementById('errorMessage').textContent = message;
        }
        
        function viewPlans() {
            window.location.href = 'index.html#pricing-section';
        }
        
        function goHome() {
            // Clear unauthorized context
            sessionStorage.removeItem('unauthorized_tier');
            sessionStorage.removeItem('unauthorized_message');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
