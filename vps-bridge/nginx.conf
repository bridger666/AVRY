# Nginx reverse proxy configuration for Aivory Bridge
# Place in /etc/nginx/sites-available/aivory-bridge
# Symlink to /etc/nginx/sites-enabled/

upstream aivory_bridge {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream n8n_backend {
    server 127.0.0.1:5678;
    keepalive 64;
}

# HTTP redirect to HTTPS (after SSL setup)
server {
    listen 80;
    server_name api.aivory.id;
    
    # For Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server (after SSL setup)
server {
    listen 443 ssl http2;
    server_name api.aivory.id;
    
    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.aivory.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aivory.id/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Logging
    access_log /var/log/nginx/aivory-bridge-access.log;
    error_log /var/log/nginx/aivory-bridge-error.log;
    
    # Aivory Bridge API
    location /api/ {
        proxy_pass http://aivory_bridge;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check
    location /health {
        proxy_pass http://aivory_bridge;
        access_log off;
    }
}

# n8n subdomain (optional)
server {
    listen 443 ssl http2;
    server_name n8n.aivory.id;
    
    ssl_certificate /etc/letsencrypt/live/n8n.aivory.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.aivory.id/privkey.pem;
    
    location / {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
