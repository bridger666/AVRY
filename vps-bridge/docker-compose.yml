version: '3.8'

services:
  aivory-bridge:
    build: .
    container_name: aivory-bridge
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - /usr/local/bin/picoclaw:/usr/local/bin/picoclaw:ro
      - ~/.picoclaw:/home/node/.picoclaw:ro
    networks:
      - aivory-network
    depends_on:
      - n8n
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - aivory-network

networks:
  aivory-network:
    driver: bridge

volumes:
  n8n_data:
